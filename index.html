<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=0" />
    <meta name="theme-color" content="#0369a1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HOD Portal" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <script>
      // Safe fallback/interceptor for read-only fetch in sandboxed iframe environments
      (function() {
        try {
          const originalFetch = window.fetch;
          let activeFetch = originalFetch;
          
          Object.defineProperty(window, 'fetch', {
            get() {
              return activeFetch;
            },
            set(v) {
              activeFetch = v;
            },
            configurable: true,
            enumerable: true
          });
        } catch (err) {
          console.warn("Could not instrument window.fetch for sandbox safety:", err);
        }
      })();
    </script>
    <title>HOD Portal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
